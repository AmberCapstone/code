edition = "2023";

package spi_flash;

message Page {
    uint32 page_number = 1;
    fixed32 data_crc = 2;
    bytes data = 3;
}

enum Action {
    ACTION_NONE = 0;
    ACTION_FLASH = 1;
    ACTION_READOUT = 2;
}

enum State {
    STATE_UNKNOWN = 0;
    STATE_IDLE = 1;
    STATE_FLASHING = 2;
    STATE_READOUT = 3;
}

message Command {
    Action action = 1;
    Page page = 2;

    uint32 page_request = 3; // ONLY USED IN READOUT
}


message Status {
    // Diagnostics
    uint32 tx_counter = 1;
    uint32 rx_counter = 2;
    int32 temperature_degc = 3;
    int32 vbat_mv = 4;
    int32 vrefint_mv = 5;

    State state = 6;

    uint32 page_request = 7; // only used in FLASHING
}