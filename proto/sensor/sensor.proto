edition = "2023";

package sensor;

import "flash.proto";

enum Action {
    ACTION_NONE = 0;
    ACTION_FLASH = 1;
    ACTION_READOUT = 2;
}

enum State {
    STATE_UNKNOWN = 0;
    STATE_IDLE = 1;
    STATE_FLASHING = 2;
    STATE_READOUT = 3;
}

message Command {
    Action action = 1;
    flash.Page page = 2;

    uint32 page_request = 3; // only used in STATE_READOUT

    uint32 tx_number = 5;
}


message Status {
    // Diagnostics
    uint32 tx_counter = 1;
    uint32 rx_counter = 2;
    int32 temperature_degc = 3;
    int32 vbat_mv = 4;
    int32 vrefint_mv = 5;

    State state = 6;

    // Only used in STATE_FLASHING
    flash.Status flash_status = 7;

    uint32 last_msg_size = 11;
    uint32 rx_buf_count = 12;
    uint32 failed_crc = 14;
    uint32 micros = 13;

    Action last_action = 15;

    uint32 received_bytes = 16;
    uint32 decoded_bytes = 17;
}
