syntax = "proto3";

package sensor.nvm;

enum Action {
    ACTION_NONE = 0;
    ACTION_READ = 1;
    ACTION_WRITE = 2;
    ACTION_RESET_CAMERA = 3;
    ACTION_RESET_ALL = 4;
}

enum State {
    STATE_UNKNOWN = 0;
    STATE_READY = 1;
    STATE_COOLDOWN = 2;
}

message Parameters {
    string name = 1;
    uint32 supercapacitor_uf = 2;
    repeated fixed32 camera_settings =
        3;  // packed as [0x0000VVRR] where 0xRR is reg address, 0xVV is value
    bool usb_starts_on = 4;
}

message Command {
    optional Action action = 1;
    optional Parameters new_parameters = 2;
}

message Status {
    optional State state = 1;
    optional Parameters current_parameters = 2;
}
