syntax = "proto3";

import "sensor/fpga/flash.proto";

package sensor.fpga;

enum State {
    STATE_UNKNOWN = 0;
    STATE_OFF = 1;
    STATE_BOOTING = 2;
    STATE_RUNNING = 3;

    STATE_SPI_FLASH = 14;
    STATE_LOW_POWER_IDLE = 15;
}

enum Action {
    ACTION_NONE = 0;
    ACTION_RUN = 1;
    ACTION_SPI_FLASH = 2;

    ACTION_IDLE = 15;
}

message Status {
    State state = 1;
    flash.Status flash = 2;
}

message Command {
    bool enable_power = 1;
    optional Action action = 2;
    optional flash.Command flash = 3;
}
