syntax = "proto3";

package sensor.flash;

message Page {
    optional uint32 page_number = 1;
    optional bytes data = 2;
    optional fixed32 crc = 3; // CRC32 of page_number (4 bytes, little endian) then data (256 bytes)
}

enum State {
    STATE_UNKNOWN = 0;
    STATE_IDLE = 1;
    STATE_ERASING = 2;
    STATE_PROGRAMMING = 3;
    STATE_READOUT = 4;
    STATE_DONE = 5;
}

message Status {
    optional State state = 1;
    optional uint32 stm_page_request = 2;
    optional Page readout_page = 3;
}
