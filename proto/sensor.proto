syntax = "proto3";

package sensor;

import "sensor/flash.proto";

enum Action {
    ACTION_NONE = 0;
    ACTION_RESET = 1;
    ACTION_FLASH = 2;
    ACTION_READOUT = 3;
}

enum State {
    STATE_UNKNOWN = 0;
    STATE_IDLE = 1;
    STATE_FLASHING = 2;
    STATE_READOUT = 3;
}

message Command {
    optional Action action = 1;
    optional flash.Page page = 2;

    optional uint32 host_page_request = 3; // only used in STATE_READOUT
}


message Status {
    // Diagnostics
    optional uint32 tx_counter = 1;
    optional uint32 rx_counter = 2;
    optional int32 temperature_degc = 3;
    optional int32 vbat_mv = 4;
    optional int32 vrefint_mv = 5;

    optional State state = 6;

    // Only used in STATE_FLASHING
    optional flash.Status flash_status = 7;

    optional uint32 micros = 8;

    // sensors
    optional uint32 supercap_mv = 10;
    optional uint32 iload_ma = 11;
}
