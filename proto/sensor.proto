edition = "2023";

package sensor;

message Page {
    uint32 page_number = 1;
    fixed32 data_crc = 2;
    bytes data = 3;
}

enum Action {
    ACTION_NONE = 0;
    ACTION_FLASH = 1;
    ACTION_READOUT = 2;
}

enum State {
    STATE_UNKNOWN = 0;
    STATE_IDLE = 1;
    STATE_FLASHING = 2;
    STATE_READOUT = 3;
}

enum FlashState {
    FLASH_STATE_UNKNOWN = 0;
    FLASH_STATE_ERASING = 1;
    FLASH_STATE_WRITING = 2;
    FLASH_STATE_VERIFYING = 3;
    FLASH_STATE_DONE = 4;
}

message Command {
    Action action = 1;
    Page page = 2;

    uint32 page_request = 3; // only used in STATE_READOUT
}


message Status {
    // Diagnostics
    uint32 tx_counter = 1;
    uint32 rx_counter = 2;
    int32 temperature_degc = 3;
    int32 vbat_mv = 4;
    int32 vrefint_mv = 5;

    State state = 6;

    // Only used in STATE_FLASHING
    FlashState flash_state = 7;
    uint32 page_request = 8;

}