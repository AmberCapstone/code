syntax = "proto3";

package sensor;

import "sensor/camera.proto";
import "sensor/fpga.proto";
import "sensor/measure.proto";
import "sensor/nvm.proto";

enum State {
    STATE_UNKNOWN = 0;
    STATE_MANUAL = 1;
    STATE_CHARGING = 2;
    STATE_CAPTURE = 3;
    STATE_LOW_CHARGE = 4;
}

enum Action {
    ACTION_NONE = 0;
    ACTION_MONITOR = 1;
    ACTION_MANUAL = 2;
}

message Command {
    optional Action action = 1;

    optional fpga.Command fpga = 2;
    optional camera.Command camera = 3;
    optional nvm.Command nvm = 4;
}

message Status {
    State state = 1;
    Measurement measurement = 2;
    fixed64 alerts = 3;  // bitfield representing Alerts enum

    optional fpga.Status fpga = 4;
    optional camera.Status camera = 5;
    optional nvm.Status nvm = 6;

    // Diagnostics
    optional string name = 13;
    optional uint32 tx_counter = 14;
    optional uint32 rx_counter = 15;
}
