syntax = "proto3";

package base_station;

message Command {
    uint32 dummy = 1;
}

message Status {
    uint32 dummy_echo = 1;
    // Diagnostics
    optional uint32 tx_counter = 14;
    optional uint32 rx_counter = 15;
    optional float temperature = 16;
    optional uint32 uart_byte = 17;
    optional uint32 uart_receive_count = 18;
}
